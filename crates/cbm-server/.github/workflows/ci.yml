name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo test
        run: cargo test --all-targets

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo build release
        run: cargo build --release

      - name: smoke test binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            BIN=./target/release/cbm.exe
          else
            BIN=./target/release/cbm
          fi
          "$BIN" --version
          "$BIN" install --dry-run --all
          "$BIN" hook-session-start >/dev/null

      - name: smoke graph CLI (Section 4)
        shell: bash
        run: bash ./scripts/smoke-quality-gates.sh --skip-build

      - name: smoke release artifact (Section 6)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/smoke-release-artifact.ps1 -SkipBuild
