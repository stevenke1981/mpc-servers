name: Release

on:
  push:
    tags:
      - "v*"
      - "*-v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify release readiness
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build release binaries for smoke tests
        shell: pwsh
        run: cargo build --release

      - name: Run release readiness checks
        shell: pwsh
        run: .\scripts\release-check.ps1 -Server all -SkipBuild

  package:
    name: Package ${{ matrix.asset }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            asset: mpc-servers-windows-x86_64.zip
            exe_suffix: .exe
            archive: zip
          - runner: windows-11-arm
            asset: mpc-servers-windows-aarch64.zip
            exe_suffix: .exe
            archive: zip
          - runner: ubuntu-latest
            asset: mpc-servers-linux-x86_64.tar.gz
            exe_suffix: ""
            archive: tar
          - runner: ubuntu-24.04-arm
            asset: mpc-servers-linux-aarch64.tar.gz
            exe_suffix: ""
            archive: tar
          - runner: macos-15-intel
            asset: mpc-servers-macos-x86_64.tar.gz
            exe_suffix: ""
            archive: tar
          - runner: macos-latest
            asset: mpc-servers-macos-aarch64.tar.gz
            exe_suffix: ""
            archive: tar
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        shell: pwsh
        run: cargo build --release

      - name: Stage bundle contents
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bundle = Join-Path $PWD "dist/bundle"
          New-Item -ItemType Directory -Force -Path $bundle | Out-Null

          $bins = @(
            "cbm",
            "everything-server",
            "filesystem-server",
            "fetch-server",
            "git-server",
            "memory-mcp-server",
            "nushell-mcp",
            "rlm-mcp",
            "time-server",
            "sequential-thinking-server"
          )

          foreach ($bin in $bins) {
            $file = "$bin${{ matrix.exe_suffix }}"
            $source = Join-Path $PWD "target/release/$file"
            if (-not (Test-Path -LiteralPath $source)) {
              throw "Missing release binary: $source"
            }
            Copy-Item -LiteralPath $source -Destination (Join-Path $bundle $file) -Force
          }

          foreach ($path in @("README.md", "VERSIONING.md", "spec.md", "plan.md", "todos.md", "install.ps1", "install.sh", "uninstall.ps1", "uninstall.sh")) {
            Copy-Item -LiteralPath (Join-Path $PWD $path) -Destination $bundle -Force
          }
          Copy-Item -LiteralPath (Join-Path $PWD "packaging") -Destination $bundle -Recurse -Force
          Copy-Item -LiteralPath (Join-Path $PWD "docs") -Destination $bundle -Recurse -Force

      - name: Create zip archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $asset = Join-Path $PWD "dist/${{ matrix.asset }}"
          Compress-Archive -Path (Join-Path $PWD "dist/bundle/*") -DestinationPath $asset -Force

      - name: Create tar archive
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          set -euo pipefail
          tar -C dist/bundle -czf "dist/${{ matrix.asset }}" .

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum mpc-servers-* > SHA256SUMS.txt

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --verify-tag \
              --title "$TAG_NAME" \
              --notes "Release $TAG_NAME"
          fi
          gh release upload "$TAG_NAME" dist/mpc-servers-* dist/SHA256SUMS.txt --clobber
